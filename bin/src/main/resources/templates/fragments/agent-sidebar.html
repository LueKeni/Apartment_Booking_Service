<aside th:fragment="agentSidebar(activePage)" class="glass-card sticky top-24 h-fit p-4">
  <p class="text-xs uppercase tracking-[0.14em] text-slate-500">Agent Workspace</p>
  <h2 class="mt-1 text-lg font-semibold text-ink">Operations Panel</h2>
  <nav class="mt-4 space-y-2 text-sm font-semibold">
    <a href="/agent/dashboard"
       class="block rounded-xl border px-3 py-2"
       th:classappend="${activePage == 'dashboard'} ? ' border-transparent bg-tealdeep text-white' : ' border-slate-200 bg-white/70 text-slate-700 hover:bg-white'">Dashboard</a>
    <a href="/agent/listings"
       class="block rounded-xl border px-3 py-2"
       th:classappend="${activePage == 'listings'} ? ' border-transparent bg-tealdeep text-white' : ' border-slate-200 bg-white/70 text-slate-700 hover:bg-white'">Listings</a>
    <a href="/agent/bookings"
       class="block rounded-xl border px-3 py-2"
       th:classappend="${activePage == 'bookings'} ? ' border-transparent bg-tealdeep text-white' : ' border-slate-200 bg-white/70 text-slate-700 hover:bg-white'">Bookings</a>
    <a href="/agent/points"
       class="block rounded-xl border px-3 py-2"
       th:classappend="${activePage == 'points'} ? ' border-transparent bg-tealdeep text-white' : ' border-slate-200 bg-white/70 text-slate-700 hover:bg-white'">Points</a>
    <a href="/chat"
       class="block rounded-xl border px-3 py-2"
       th:classappend="${activePage == 'chat'} ? ' border-transparent bg-tealdeep text-white' : ' border-slate-200 bg-white/70 text-slate-700 hover:bg-white'">
      <span class="flex items-center justify-between gap-2">
        <span>Chat</span>
        <span data-chat-unread-badge
              class="hidden min-w-[22px] rounded-full bg-coral px-2 py-0.5 text-center text-xs font-semibold text-white"></span>
      </span>
    </a>
    <a href="/agent/profile"
       class="block rounded-xl border px-3 py-2"
       th:classappend="${activePage == 'profile'} ? ' border-transparent bg-tealdeep text-white' : ' border-slate-200 bg-white/70 text-slate-700 hover:bg-white'">Profile</a>
  </nav>
</aside>
