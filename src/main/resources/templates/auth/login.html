<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Sign In')}"></head>
<body class="bg-slate-50 font-sans text-slate-900 antialiased flex flex-col min-h-screen">
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="flex-grow flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
      <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-slate-900">Welcome back</h2>
      <p class="mt-2 text-center text-sm text-slate-600">
        Please sign in to your account to continue
      </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-[480px]">
      <div class="bg-white px-6 py-10 shadow-sm ring-1 ring-slate-200 sm:rounded-2xl sm:px-12">
        
        <div th:if="${param.error}" class="mb-6 rounded-xl bg-red-50 p-4 ring-1 ring-inset ring-red-600/20">
          <div class="flex">
            <div class="flex-shrink-0">
              <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" /></svg>
            </div>
            <div class="ml-3">
              <p class="text-sm font-medium text-red-800">Invalid email or password.</p>
            </div>
          </div>
        </div>
        
        <div th:if="${param.logout}" class="mb-6 rounded-xl bg-green-50 p-4 ring-1 ring-inset ring-green-600/20">
          <p class="text-sm font-medium text-green-800">You have been successfully logged out.</p>
        </div>
        
        <div th:if="${param.registered}" class="mb-6 rounded-xl bg-blue-50 p-4 ring-1 ring-inset ring-blue-600/20">
          <p class="text-sm font-medium text-blue-800">Registration successful! You can now sign in.</p>
        </div>

        <form action="/auth/login" method="post" class="space-y-6">
          <div>
            <label for="username" class="block text-sm font-medium leading-6 text-slate-900">Email address</label>
            <div class="mt-2">
              <input id="username" name="username" type="email" autocomplete="email" required class="block w-full rounded-md border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" />
            </div>
          </div>

          <div>
            <label for="password" class="block text-sm font-medium leading-6 text-slate-900">Password</label>
            <div class="mt-2">
              <input id="password" name="password" type="password" autocomplete="current-password" required class="block w-full rounded-md border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" />
            </div>
          </div>

          <div class="flex items-center justify-between">
            <div class="flex items-center">
              <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-600" />
              <label for="remember-me" class="ml-3 block text-sm leading-6 text-slate-700">Remember me</label>
            </div>
            <div class="text-sm leading-6">
              <a href="#" class="font-semibold text-indigo-600 hover:text-indigo-500">Forgot password?</a>
            </div>
          </div>

          <div>
            <button type="submit" class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 transition-colors">Sign in</button>
          </div>
        </form>

        <p class="mt-8 text-center text-sm text-slate-500">
          Not a member?
          <a href="/auth/register" class="font-semibold leading-6 text-indigo-600 hover:text-indigo-500">Create an account</a>
        </p>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
