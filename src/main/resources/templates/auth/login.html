<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Sign In')}"></head>
<body class="min-h-screen bg-[#fdf9ef] flex flex-col font-sans text-slate-900 antialiased">
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="flex-grow flex items-center justify-center p-4 py-12">
    <div class="w-full max-w-md bg-[#fcf6e8] rounded-[2rem] p-8 sm:p-10 shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white/50">
      
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-[#1e293b] mb-2">Welcome Back</h1>
        <p class="text-sm text-slate-500 font-medium">Sign in to your account to continue</p>
      </div>

      <div th:if="${param.error}" class="mb-6 rounded-xl bg-rose-100/50 p-4 text-sm font-medium text-rose-600 text-center border border-rose-200">
        Invalid email or password.
      </div>
      <div th:if="${param.logout}" class="mb-6 rounded-xl bg-emerald-100/50 p-4 text-sm font-medium text-emerald-600 text-center border border-emerald-200">
        Logged out successfully.
      </div>

      <form action="/auth/login" method="post" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Email Address</label>
          <input name="username" type="email" placeholder="Enter your email" required 
                 class="w-full rounded-2xl border-0 bg-[#fdfaf2] px-4 py-3.5 text-slate-900 shadow-inner ring-1 ring-inset ring-black/5 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-[#0b1437] transition-all sm:text-sm" />
        </div>
        
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Password</label>
          <input name="password" type="password" placeholder="Enter your password" required 
                 class="w-full rounded-2xl border-0 bg-[#fdfaf2] px-4 py-3.5 text-slate-900 shadow-inner ring-1 ring-inset ring-black/5 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-[#0b1437] transition-all sm:text-sm" />
        </div>

        <button type="submit" class="w-full mt-2 rounded-2xl bg-[#0b1437] px-4 py-3.5 text-sm font-bold text-white shadow-lg hover:bg-[#1a234b] hover:shadow-xl transition-all transform hover:-translate-y-0.5">
          Sign In
        </button>
      </form>

      <div class="my-6 flex items-center gap-3">
        <div class="h-px flex-1 bg-slate-200"></div>
        <span class="text-xs font-semibold uppercase tracking-wide text-slate-400">or</span>
        <div class="h-px flex-1 bg-slate-200"></div>
      </div>

      <div class="space-y-3">
        <a href="/oauth2/authorization/google"
           class="flex w-full items-center justify-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
          Continue with Google
        </a>
        <a href="/oauth2/authorization/facebook"
           class="flex w-full items-center justify-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">
          Continue with Facebook
        </a>
      </div>

      <div class="mt-8 text-center">
        <a href="#" class="text-sm font-semibold text-slate-500 hover:text-[#0b1437] transition-colors">Forgot your password?</a>
        <p class="mt-2 text-sm text-slate-500">
          No account? <a href="/auth/register" class="font-bold text-[#0b1437] hover:underline">Register</a>
        </p>
      </div>
      
    </div>
  </main>
</body>
</html>
