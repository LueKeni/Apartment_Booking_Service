<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100">
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="mx-auto max-w-md px-4 py-10">
    <div class="rounded-xl bg-white p-6 shadow">
      <h1 class="text-2xl font-semibold">Login</h1>
      <p class="mt-1 text-sm text-slate-500">Use your account to continue.</p>

      <div th:if="${param.error}" class="mt-4 rounded bg-rose-100 px-3 py-2 text-sm text-rose-700">Invalid credentials.</div>
      <div th:if="${param.logout}" class="mt-4 rounded bg-emerald-100 px-3 py-2 text-sm text-emerald-700">Logged out successfully.</div>
      <div th:if="${param.registered}" class="mt-4 rounded bg-emerald-100 px-3 py-2 text-sm text-emerald-700">Registration completed.</div>

      <form action="/auth/login" method="post" class="mt-6 space-y-4">
        <div>
          <label class="block text-sm text-slate-600">Email</label>
          <input name="username" type="email" required class="mt-1 w-full rounded border border-slate-300 px-3 py-2" />
        </div>
        <div>
          <label class="block text-sm text-slate-600">Password</label>
          <input name="password" type="password" required class="mt-1 w-full rounded border border-slate-300 px-3 py-2" />
        </div>
        <button class="w-full rounded bg-slate-900 px-4 py-2 text-white">Sign In</button>
      </form>

      <p class="mt-4 text-sm text-slate-600">No account? <a href="/auth/register" class="text-slate-900 underline">Register</a></p>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
