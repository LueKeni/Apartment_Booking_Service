<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Create Account')}"></head>
<body class="min-h-screen bg-[#fdf9ef] flex flex-col font-sans text-slate-900 antialiased">
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="flex-grow flex items-center justify-center p-4 py-12">
    <div class="w-full max-w-md bg-[#fcf6e8] rounded-[2rem] p-8 sm:p-10 shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white/50">
      
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-[#1e293b] mb-2">Create Account</h1>
        <p class="text-sm text-slate-500 font-medium">Join Aurelia Grand Estates to find your perfect home</p>
      </div>

      <div th:if="${error}" class="mb-6 rounded-xl bg-rose-100/50 p-4 text-sm font-medium text-rose-600 text-center border border-rose-200" th:text="${error}"></div>

      <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Full Name</label>
          <input th:field="*{fullName}" type="text" placeholder="John Doe" required 
                 class="w-full rounded-2xl border-0 bg-[#fdfaf2] px-4 py-3.5 text-slate-900 shadow-inner ring-1 ring-inset ring-black/5 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-[#0b1437] transition-all sm:text-sm" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Email Address</label>
          <input th:field="*{email}" type="email" placeholder="Enter your email" required 
                 class="w-full rounded-2xl border-0 bg-[#fdfaf2] px-4 py-3.5 text-slate-900 shadow-inner ring-1 ring-inset ring-black/5 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-[#0b1437] transition-all sm:text-sm" />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Phone <span class="text-slate-400 font-normal">(Optional)</span></label>
          <input th:field="*{phone}" type="tel" placeholder="Your phone number" 
                 class="w-full rounded-2xl border-0 bg-[#fdfaf2] px-4 py-3.5 text-slate-900 shadow-inner ring-1 ring-inset ring-black/5 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-[#0b1437] transition-all sm:text-sm" />
        </div>
        
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Password</label>
          <input th:field="*{password}" type="password" placeholder="Create a strong password" required 
                 class="w-full rounded-2xl border-0 bg-[#fdfaf2] px-4 py-3.5 text-slate-900 shadow-inner ring-1 ring-inset ring-black/5 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-[#0b1437] transition-all sm:text-sm" />
        </div>

        <button type="submit" class="w-full mt-4 rounded-2xl bg-[#0b1437] px-4 py-3.5 text-sm font-bold text-white shadow-lg hover:bg-[#1a234b] hover:shadow-xl transition-all transform hover:-translate-y-0.5">
          Sign Up
        </button>
      </form>

      <div class="mt-6 mb-4 relative flex items-center justify-center">
        <div class="absolute inset-0 flex items-center" aria-hidden="true">
          <div class="w-full border-t border-slate-300/60"></div>
        </div>
        <div class="relative flex justify-center">
          <span class="bg-[#fcf6e8] px-4 text-[11px] font-bold uppercase tracking-wider text-slate-400">Or continue with</span>
        </div>
      </div>

      <div class="flex gap-3">
        <a href="/oauth2/authorization/google" class="flex flex-1 items-center justify-center gap-2 rounded-2xl bg-[#fdfaf2] px-4 py-3 text-sm font-semibold text-slate-700 shadow-sm ring-1 ring-inset ring-black/5 hover:bg-white hover:shadow-md transition-all">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="h-5 w-5" />
          Google
        </a>
        <a href="/oauth2/authorization/facebook" class="flex flex-1 items-center justify-center gap-2 rounded-2xl bg-[#fdfaf2] px-4 py-3 text-sm font-semibold text-slate-700 shadow-sm ring-1 ring-inset ring-black/5 hover:bg-white hover:shadow-md transition-all">
          <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" alt="Facebook" class="h-5 w-5" />
          Facebook
        </a>
      </div>

      <div class="mt-8 text-center">
        <p class="text-sm text-slate-500">
          Already have an account? <a href="/auth/login" class="font-bold text-[#0b1437] hover:underline">Sign in</a>
        </p>
      </div>
      
    </div>
  </main>
</body>
</html>
