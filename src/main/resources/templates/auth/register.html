<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Create Account')}"></head>
<body class="bg-slate-50 font-sans text-slate-900 antialiased flex flex-col min-h-screen">
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="flex-grow flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
      <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-slate-900">Create an account</h2>
      <p class="mt-2 text-center text-sm text-slate-600">
        Join our apartment booking platform today
      </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-[480px]">
      <div class="bg-white px-6 py-10 shadow-sm ring-1 ring-slate-200 sm:rounded-2xl sm:px-12">
        
        <div th:if="${error}" class="mb-6 rounded-xl bg-red-50 p-4 ring-1 ring-inset ring-red-600/20">
          <div class="flex">
            <div class="flex-shrink-0">
              <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" /></svg>
            </div>
            <div class="ml-3">
              <p class="text-sm font-medium text-red-800" th:text="${error}"></p>
            </div>
          </div>
        </div>

        <form th:action="@{/auth/register}" th:object="${registerRequest}" method="post" class="space-y-5">
          <div>
            <label for="fullName" class="block text-sm font-medium leading-6 text-slate-900">Full Name</label>
            <div class="mt-2">
              <input id="fullName" th:field="*{fullName}" type="text" required class="block w-full rounded-md border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" placeholder="John Doe" />
            </div>
          </div>

          <div>
            <label for="email" class="block text-sm font-medium leading-6 text-slate-900">Email address</label>
            <div class="mt-2">
              <input id="email" th:field="*{email}" type="email" autocomplete="email" required class="block w-full rounded-md border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" placeholder="you@example.com" />
            </div>
          </div>

          <div>
            <label for="phone" class="block text-sm font-medium leading-6 text-slate-900">Phone Number <span class="text-slate-400 font-normal">(Optional)</span></label>
            <div class="mt-2">
              <input id="phone" th:field="*{phone}" type="tel" class="block w-full rounded-md border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" placeholder="+84 123 456 789" />
            </div>
          </div>

          <div>
            <label for="password" class="block text-sm font-medium leading-6 text-slate-900">Password</label>
            <div class="mt-2">
              <input id="password" th:field="*{password}" type="password" autocomplete="new-password" required class="block w-full rounded-md border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" />
            </div>
          </div>

          <div class="pt-2">
            <button type="submit" class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 transition-colors">Create Account</button>
          </div>
        </form>

        <p class="mt-8 text-center text-sm text-slate-500">
          Already have an account?
          <a href="/auth/login" class="font-semibold leading-6 text-indigo-600 hover:text-indigo-500">Sign in here</a>
        </p>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
