<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Apartment Details')}"></head>
<body>
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="page-enter mx-auto max-w-5xl px-4 py-8" th:if="${apartment != null}">
    <section class="glass-card p-6">
      <h1 class="text-2xl font-semibold" th:text="${apartment.title}"></h1>
      <p class="mt-1 text-slate-500" th:text="${apartment.fullAddressLabel != null ? apartment.fullAddressLabel : apartment.locationAddress}"></p>
      <p class="mt-1 text-sm text-slate-600" th:text="${'Room type: ' + (apartment.roomType != null ? apartment.roomType : 'N/A')}"></p>
      <p class="mt-3 text-2xl font-semibold text-emerald-600" th:text="${apartment.price}"></p>
      <div class="mt-4 space-y-3" th:if="${!#lists.isEmpty(apartment.images)}">
        <img th:src="${apartment.images[0]}" alt="Apartment image" class="h-72 w-full rounded-lg object-cover" />
        <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3" th:if="${apartment.images.size() > 1}">
          <img th:each="imageUrl, imageStat : ${apartment.images}"
               th:if="${imageStat.index > 0}"
               th:src="${imageUrl}"
               alt="Apartment gallery image"
               class="h-40 w-full rounded-lg object-cover" />
        </div>
      </div>
      <p class="mt-3 text-slate-700" th:text="${apartment.description}"></p>

      <div class="mt-6 rounded-lg border border-slate-200 p-4" th:if="${apartment.latitude != null and apartment.longitude != null}">
        <div class="mb-3 flex items-center justify-between gap-3">
          <h2 class="font-semibold">Location Map</h2>
          <a th:href="${'https://www.google.com/maps/search/?api=1&query=' + apartment.latitude + ',' + apartment.longitude}"
             target="_blank"
             rel="noopener noreferrer"
             class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-semibold text-slate-700">
            Open in Google Maps
          </a>
        </div>
        <iframe
                class="h-72 w-full rounded-lg border border-slate-200"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                th:src="${'https://www.google.com/maps?q=' + apartment.latitude + ',' + apartment.longitude + '&z=15&output=embed'}">
        </iframe>
      </div>

      <div class="mt-6 grid gap-4 md:grid-cols-2">
        <div class="rounded-lg border border-slate-200 bg-white/70 p-4">
          <h2 class="font-semibold">Agent</h2>
          <p class="mt-2" th:text="${apartment.agent.fullName}"></p>
          <p class="text-sm text-slate-500" th:text="${agentProfile != null ? agentProfile.location : 'N/A'}"></p>
          <p class="text-sm text-slate-500" th:text="${agentProfile != null ? agentProfile.bio : ''}"></p>
          <div class="mt-3 rounded-lg bg-slate-50 px-3 py-2 text-sm text-slate-700">
            <span th:text="${'Rating: ' + agentAverageRating + ' / 5'}"></span>
            <span class="ml-2 text-slate-500" th:text="${'(' + agentReviewCount + ' reviews)'}"></span>
          </div>
        </div>

        <div class="space-y-4">
          <div class="rounded-lg border border-slate-200 bg-white/70 p-4" th:if="${isAuthenticated and hasRoleUser and !hasRoleAgent}">
            <h2 class="font-semibold">Book Appointment</h2>
            <form action="/user/bookings" method="post" class="mt-3 space-y-3">
              <input type="hidden" name="apartmentId" th:value="${apartment.id}" />
              <div>
                <label class="block text-sm text-slate-600">Date</label>
                <input type="date" name="scheduledDate" required class="mt-1 w-full rounded border border-slate-300 px-3 py-2" />
              </div>
              <div>
                <label class="block text-sm text-slate-600">Time</label>
                <input type="time" name="scheduledTime" required class="mt-1 w-full rounded border border-slate-300 px-3 py-2" />
              </div>
              <div>
                <label class="block text-sm text-slate-600">Note</label>
                <textarea name="userNote" class="mt-1 w-full rounded border border-slate-300 px-3 py-2"></textarea>
              </div>
              <button class="rounded bg-slate-900 px-4 py-2 text-white">Book</button>
            </form>

            <form th:action="@{/user/favorites/{id}/toggle(id=${apartment.id})}" method="post" class="mt-3">
              <button class="rounded border border-slate-300 px-4 py-2">Toggle Favorite</button>
            </form>
          </div>
          <div class="rounded-lg border border-slate-200 bg-white/70 p-4" th:if="${isAuthenticated and hasRoleUser and !hasRoleAgent}">
            <h2 class="font-semibold">Chat With Agent</h2>
            <p class="mt-2 text-sm text-slate-600">Ask about availability, pricing, or schedule a visit instantly.</p>
            <a th:href="@{/chat(recipientId=${apartment.agent.id}, apartmentId=${apartment.id})}"
               class="mt-4 inline-flex items-center justify-center rounded bg-tealdeep px-4 py-2 text-sm font-semibold text-white">
              Open Chat
            </a>
          </div>
          <div class="rounded-lg border border-slate-200 bg-white/70 p-4 text-sm text-slate-600" th:if="${!isAuthenticated or hasRoleAgent}">
            Booking and chat are available for user accounts only.
          </div>
        </div>
      </div>
    </section>

    <section class="mt-8 glass-card p-6">
      <div class="mb-4 flex items-center justify-between">
        <h2 class="text-xl font-semibold">Related Listings</h2>
        <span class="text-sm text-slate-500" th:text="${'By room type: ' + (apartment.roomType != null ? apartment.roomType : 'N/A')}"></span>
      </div>
      <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
        <article th:if="${#lists.isEmpty(relatedApartments)}" class="rounded-xl border border-dashed border-slate-300 p-4 text-sm text-slate-500">
          No related listings found.
        </article>
        <article th:each="related : ${relatedApartments}" class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <img th:if="${!#lists.isEmpty(related.images)}"
               th:src="${related.images[0]}"
               alt="Related apartment image"
               class="mb-3 h-36 w-full rounded-lg object-cover" />
          <h3 class="text-lg font-semibold text-ink" th:text="${related.title}"></h3>
          <p class="mt-1 text-sm text-slate-600" th:text="${related.locationAreaLabel != null ? related.locationAreaLabel : '-'}"></p>
          <p class="mt-2 text-lg font-semibold text-emerald-600" th:text="${related.price}"></p>
          <a th:href="@{/apartments/{id}(id=${related.id})}" class="mt-3 inline-block rounded bg-slate-900 px-3 py-1.5 text-sm text-white">View Details</a>
        </article>
      </div>
    </section>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
