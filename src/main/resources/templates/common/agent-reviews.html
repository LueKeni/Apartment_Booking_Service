<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Agent Reviews')}"></head>
<body>
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="page-enter mx-auto max-w-6xl px-4 py-8">
    <section class="glass-card p-6">
      <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
        <div class="flex items-center gap-4">
          <img th:src="${agentUser.avatar != null ? agentUser.avatar : '/uploads/avatars/default.png'}"
               alt="Agent avatar"
               class="h-20 w-20 rounded-full border-4 border-white object-cover shadow-md" />
          <div>
            <p class="text-xs uppercase tracking-[0.2em] text-slate-500">Top Agent Profile</p>
            <h1 class="text-3xl font-semibold text-ink" th:text="${agentUser.fullName}"></h1>
            <p class="mt-1 text-sm text-slate-500" th:text="${agentProfile.location != null ? agentProfile.location : 'Location updating'}"></p>
            <p class="mt-2 max-w-2xl text-sm text-slate-600" th:text="${agentProfile.bio != null ? agentProfile.bio : 'This agent has not added a bio yet.'}"></p>
          </div>
        </div>
        <div class="grid gap-3 sm:grid-cols-3">
          <div class="rounded-2xl bg-slate-50 px-4 py-3 text-center">
            <p class="text-xs uppercase tracking-wider text-slate-500">Rating</p>
            <p class="mt-1 text-2xl font-bold text-amber-500" th:text="${agentAverageRating}"></p>
          </div>
          <div class="rounded-2xl bg-slate-50 px-4 py-3 text-center">
            <p class="text-xs uppercase tracking-wider text-slate-500">Reviews</p>
            <p class="mt-1 text-2xl font-bold text-ink" th:text="${agentReviewCount}"></p>
          </div>
          <div class="rounded-2xl bg-slate-50 px-4 py-3 text-center">
            <p class="text-xs uppercase tracking-wider text-slate-500">Listings</p>
            <p class="mt-1 text-2xl font-bold text-ink" th:text="${#lists.size(agentListings)}"></p>
          </div>
        </div>
      </div>
    </section>

    <section class="mt-6 grid gap-6 lg:grid-cols-[minmax(0,1.2fr)_minmax(300px,0.8fr)]">
      <div class="glass-card p-6">
        <div class="mb-4 flex items-center justify-between gap-3">
          <h2 class="text-xl font-semibold text-ink">Reviews And Ratings</h2>
          <span class="pill" th:text="${agentReviewCount + ' reviews'}"></span>
        </div>

        <div th:if="${#lists.isEmpty(agentReviews)}" class="rounded-2xl border border-dashed border-slate-300 p-5 text-sm text-slate-500">
          This agent has no reviews yet.
        </div>

        <div th:if="${!#lists.isEmpty(agentReviews)}" class="space-y-4">
          <article th:each="review : ${agentReviews}" class="rounded-2xl border border-slate-200 bg-white/80 p-5 shadow-sm">
            <div class="flex flex-wrap items-start justify-between gap-3">
              <div>
                <p class="font-semibold text-ink" th:text="${review.user.fullName}"></p>
                <p class="mt-1 text-xs text-slate-400" th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm')}"></p>
              </div>
              <div class="flex items-center gap-1 text-amber-500">
                <span class="text-sm font-semibold" th:text="${review.rating + '.0'}"></span>
                <i class="fas fa-star" th:each="i : ${#numbers.sequence(1, 5)}" th:classappend="${i <= review.rating} ? 'text-amber-500' : 'text-slate-200'"></i>
              </div>
            </div>
            <p class="mt-3 text-sm leading-6 text-slate-700" th:text="${review.comment != null and !review.comment.isBlank() ? review.comment : 'No written comment.'}"></p>
            <a th:if="${review.appointment != null and review.appointment.apartment != null}"
               th:href="@{/apartments/{id}(id=${review.appointment.apartment.id})}"
               class="mt-4 inline-flex rounded-full bg-slate-100 px-3 py-1.5 text-xs font-semibold text-slate-700">
              View apartment
            </a>
          </article>
        </div>
      </div>

      <aside class="space-y-6">
        <section class="glass-card p-6">
          <div class="mb-4 flex items-center justify-between gap-3">
            <h2 class="text-xl font-semibold text-ink">Agent Listings</h2>
            <span class="pill" th:text="${#lists.size(agentListings) + ' active'}"></span>
          </div>
          <div th:if="${#lists.isEmpty(agentListings)}" class="rounded-2xl border border-dashed border-slate-300 p-4 text-sm text-slate-500">
            No listings found for this agent.
          </div>
          <div th:if="${!#lists.isEmpty(agentListings)}" class="space-y-3">
            <a th:each="listing : ${agentListings}"
               th:href="@{/apartments/{id}(id=${listing.id})}"
               class="block rounded-2xl border border-slate-200 bg-white/80 p-4 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
              <p class="font-semibold text-ink" th:text="${listing.title}"></p>
              <p class="mt-1 text-sm text-slate-500" th:text="${listing.locationDistrict != null ? listing.locationDistrict : listing.locationAddress}"></p>
              <p class="mt-2 text-sm font-semibold text-tealdeep" th:text="${listing.price}"></p>
            </a>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
