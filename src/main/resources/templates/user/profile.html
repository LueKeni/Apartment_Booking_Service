<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('User Profile')}"></head>
<body class="bg-slate-50 font-sans text-slate-900 antialiased">
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="mx-auto max-w-[1400px] px-4 py-8 sm:px-6 lg:px-8">
    <div class="mb-6">
      <h1 class="text-2xl font-bold tracking-tight text-slate-900">User Profile</h1>
      <p class="mt-1 text-sm text-slate-500">Update your personal account information and settings.</p>
    </div>

    <div th:replace="~{fragments/user-tabs :: userTabs('profile')}"></div>

    <div th:if="${param.updated}" class="mb-6 rounded-xl bg-green-50 p-4 ring-1 ring-inset ring-green-600/20 text-sm font-medium text-green-800">
      Profile updated successfully.
    </div>

    <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200 max-w-3xl">
      <form action="/user/profile" method="post" enctype="multipart/form-data" class="grid gap-x-6 gap-y-6 sm:grid-cols-2">
        
        <div class="sm:col-span-2">
          <label class="block text-sm font-medium leading-6 text-slate-900">Profile Photo</label>
          <div class="mt-2 flex items-center gap-x-4">
            <img th:if="${userProfile.avatar != null}" th:src="${userProfile.avatar}" alt="User avatar" class="h-16 w-16 rounded-full object-cover ring-1 ring-slate-200" />
            <div th:if="${userProfile.avatar == null}" class="h-16 w-16 rounded-full bg-slate-100 flex items-center justify-center ring-1 ring-slate-200">
              <svg class="h-8 w-8 text-slate-300" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M18.685 19.097A9.723 9.723 0 0021.75 12c0-5.385-4.365-9.75-9.75-9.75S2.25 6.615 2.25 12a9.723 9.723 0 003.065 7.097A9.716 9.716 0 0012 21.75a9.716 9.716 0 006.685-2.653zm-12.54-1.285A7.486 7.486 0 0112 15a7.486 7.486 0 015.855 2.812A8.224 8.224 0 0112 20.25a8.224 8.224 0 01-5.855-2.438zM15.75 9a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" clip-rule="evenodd" /></svg>
            </div>
            <input name="avatarFile" type="file" accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:rounded-md file:border-0 file:bg-white file:px-3 file:py-1.5 file:text-sm file:font-semibold file:text-slate-900 file:ring-1 file:ring-inset file:ring-slate-300 hover:file:bg-slate-50" />
          </div>
        </div>

        <div class="sm:col-span-2">
          <label class="block text-sm font-medium leading-6 text-slate-900">Email Address</label>
          <div class="mt-2">
            <input type="email" th:value="${userProfile.email}" readonly class="block w-full rounded-md border-0 py-2.5 px-3 text-slate-500 bg-slate-50 ring-1 ring-inset ring-slate-200 sm:text-sm sm:leading-6 cursor-not-allowed" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium leading-6 text-slate-900">Full Name</label>
          <div class="mt-2">
            <input name="fullName" th:value="${userProfile.fullName}" required class="block w-full rounded-md border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium leading-6 text-slate-900">Phone Number</label>
          <div class="mt-2">
            <input name="phone" th:value="${userProfile.phone}" class="block w-full rounded-md border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" />
          </div>
        </div>

        <div class="sm:col-span-2 mt-4 pt-6 border-t border-slate-200">
          <button class="rounded-md bg-indigo-600 px-6 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-indigo-600 transition-colors">
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
