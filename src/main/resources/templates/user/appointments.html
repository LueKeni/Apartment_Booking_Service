<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('My Appointments')}"></head>
<body>
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="page-enter mx-auto max-w-7xl px-4 py-8">
    <section class="glass-card p-6">
      <h1 class="text-3xl font-semibold text-ink">My Appointments</h1>
      <p class="mt-1 text-sm text-slate-600">Track booking status and submit reviews after completion.</p>
    </section>

    <div th:replace="~{fragments/user-tabs :: userTabs('appointments')}"></div>

    <div th:if="${param.reviewed}" class="mb-5 rounded-2xl border border-emerald-300 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">Review submitted successfully.</div>

    <section class="data-grid cols-3">
      <article class="glass-card metric-card p-5">
        <p class="text-sm text-slate-600">Total Appointments</p>
        <p class="mt-2 text-3xl font-bold text-ink" th:text="${#lists.size(appointments)}">0</p>
      </article>
      <article class="glass-card metric-card p-5">
        <p class="text-sm text-slate-600">Pending</p>
        <p class="mt-2 text-3xl font-bold text-coral" th:text="${pendingAppointmentCount}">0</p>
      </article>
      <article class="glass-card metric-card p-5">
        <p class="text-sm text-slate-600">Completed</p>
        <p class="mt-2 text-3xl font-bold text-tealdeep" th:text="${completedAppointmentCount}">0</p>
      </article>
    </section>

    <section class="mt-6 glass-card p-6" data-table>
      <div class="table-toolbar">
        <input data-table-search type="text" placeholder="Search apartment name..." class="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" />
        <select data-table-filter-key="status" class="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
          <option value="">All status</option>
          <option value="PENDING">PENDING</option>
          <option value="CONFIRMED">CONFIRMED</option>
          <option value="CANCELLED">CANCELLED</option>
          <option value="COMPLETED">COMPLETED</option>
        </select>
        <select data-table-sort class="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
          <option value="">Sort by</option>
          <option value="scheduled:asc">Schedule Asc</option>
          <option value="scheduled:desc">Schedule Desc</option>
          <option value="apartment:asc">Apartment A-Z</option>
          <option value="apartment:desc">Apartment Z-A</option>
        </select>
      </div>

      <div class="mt-4 overflow-hidden rounded-2xl border border-slate-200">
        <table class="min-w-full divide-y divide-slate-200 text-sm">
          <thead class="bg-slate-50 text-left text-slate-600">
            <tr>
              <th class="px-4 py-3 font-semibold">Apartment</th>
              <th class="px-4 py-3 font-semibold">Schedule</th>
              <th class="px-4 py-3 font-semibold">Status</th>
              <th class="px-4 py-3 font-semibold">Action</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100 bg-white/80" data-table-body>
            <tr th:if="${#lists.isEmpty(appointments)}">
              <td class="px-4 py-4 text-slate-500" colspan="4">No appointments yet.</td>
            </tr>
            <tr data-row
                th:each="appointment : ${appointments}"
                th:attr="data-search=${appointment.apartment.title},data-status=${appointment.status},data-scheduled=${appointment.scheduledDate + 'T' + appointment.scheduledTime},data-apartment=${appointment.apartment.title}">
              <td class="px-4 py-3 font-semibold text-ink" th:text="${appointment.apartment.title}"></td>
              <td class="px-4 py-3 text-slate-600" th:text="${appointment.scheduledDate + ' ' + appointment.scheduledTime}"></td>
              <td class="px-4 py-3"><span class="pill" th:text="${appointment.status}"></span></td>
              <td class="px-4 py-3">
                <div class="flex flex-wrap items-center gap-2">
                  <form th:if="${appointment.status.name() == 'PENDING'}" th:action="@{/user/appointments/{id}/cancel(id=${appointment.id})}" method="post">
                    <button class="rounded-lg border border-rose-400 bg-white px-3 py-1.5 text-xs font-semibold text-rose-700">Cancel</button>
                  </form>

                  <form th:if="${appointment.status.name() == 'COMPLETED' and !reviewedAppointmentIds.contains(appointment.id)}"
                        th:action="@{/user/reviews}"
                        method="post"
                        class="flex flex-wrap items-center gap-2">
                    <input type="hidden" name="appointmentId" th:value="${appointment.id}" />
                    <input type="hidden" name="fromAppointments" value="true" />
                    <select name="rating" required class="rounded-lg border border-slate-300 bg-white px-2 py-1.5 text-xs">
                      <option value="">Rating</option>
                      <option value="1">1</option>
                      <option value="2">2</option>
                      <option value="3">3</option>
                      <option value="4">4</option>
                      <option value="5">5</option>
                    </select>
                    <input name="comment" placeholder="Your review" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs" />
                    <button class="rounded-lg bg-tealdeep px-3 py-1.5 text-xs font-semibold text-white">Submit</button>
                  </form>

                  <span th:if="${appointment.status.name() == 'COMPLETED' and reviewedAppointmentIds.contains(appointment.id)}"
                        class="rounded-lg bg-slate-100 px-3 py-1.5 text-xs font-semibold text-slate-600">Reviewed</span>
                </div>
              </td>
            </tr>
            <tr data-table-empty class="hidden">
              <td class="px-4 py-4 text-slate-500" colspan="4">No appointment matches current filters.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
