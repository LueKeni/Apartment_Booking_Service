<aside th:fragment="adminSidebar(activePage)" class="sticky top-24 h-fit rounded-2xl border border-slate-200/80 bg-white p-5 shadow-sm">
  <p class="text-xs font-bold uppercase tracking-[0.16em] text-slate-400">Admin Workspace</p>
  <h2 class="mt-1 font-display text-lg font-bold text-midnight-900">Control Center</h2>
  <nav class="mt-6 flex flex-col space-y-1.5">
    <a href="/admin/dashboard"
       class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold transition-colors"
       th:classappend="${activePage == 'dashboard'} ? 'bg-midnight-700 text-white shadow-sm' : 'text-slate-700 hover:bg-slate-50 hover:text-slate-900'">
      <i class="fas fa-gauge-high text-xs"></i>
      Dashboard
    </a>
    <a href="/admin/users"
       class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold transition-colors"
       th:classappend="${activePage == 'users'} ? 'bg-midnight-700 text-white shadow-sm' : 'text-slate-700 hover:bg-slate-50 hover:text-slate-900'">
      <i class="fas fa-users text-xs"></i>
      Users
    </a>
    <a href="/admin/listings"
       class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold transition-colors"
       th:classappend="${activePage == 'listings'} ? 'bg-midnight-700 text-white shadow-sm' : 'text-slate-700 hover:bg-slate-50 hover:text-slate-900'">
      <i class="fas fa-city text-xs"></i>
      Listings
    </a>
    <a href="/admin/points"
       class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold transition-colors"
       th:classappend="${activePage == 'points'} ? 'bg-midnight-700 text-white shadow-sm' : 'text-slate-700 hover:bg-slate-50 hover:text-slate-900'">
      <i class="fas fa-coins text-xs"></i>
      Points
    </a>
  </nav>
</aside>
