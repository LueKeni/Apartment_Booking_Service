<aside th:fragment="agentSidebar(activePage)" class="sticky top-24 h-fit rounded-2xl border border-slate-200/80 bg-white p-5 shadow-sm">
  <p class="text-xs font-bold uppercase tracking-[0.16em] text-slate-400">Agent Workspace</p>
  <h2 class="mt-1 font-display text-lg font-bold text-midnight-900">Portfolio Console</h2>
  <nav class="mt-6 flex flex-col space-y-1.5">
    <a href="/agent/dashboard" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold transition-colors" th:classappend="${activePage == 'dashboard'} ? 'bg-midnight-700 text-white shadow-sm' : 'text-slate-700 hover:bg-slate-50 hover:text-slate-900'">
      <i class="fas fa-chart-line text-xs"></i>
      Dashboard
    </a>
    <a href="/agent/listings" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold transition-colors" th:classappend="${activePage == 'listings'} ? 'bg-midnight-700 text-white shadow-sm' : 'text-slate-700 hover:bg-slate-50 hover:text-slate-900'">
      <i class="fas fa-building text-xs"></i>
      Listings Studio
    </a>
    <a href="/agent/bookings" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold transition-colors" th:classappend="${activePage == 'bookings'} ? 'bg-midnight-700 text-white shadow-sm' : 'text-slate-700 hover:bg-slate-50 hover:text-slate-900'">
      <i class="fas fa-calendar-check text-xs"></i>
      Bookings
    </a>
    <a href="/agent/points" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold transition-colors" th:classappend="${activePage == 'points'} ? 'bg-midnight-700 text-white shadow-sm' : 'text-slate-700 hover:bg-slate-50 hover:text-slate-900'">
      <i class="fas fa-wallet text-xs"></i>
      Wallet & Points
    </a>
    <a href="/agent/notifications" class="flex items-center justify-between rounded-xl px-3 py-2.5 text-sm font-semibold transition-colors" th:classappend="${activePage == 'notifications'} ? 'bg-midnight-700 text-white shadow-sm' : 'text-slate-700 hover:bg-slate-50 hover:text-slate-900'">
      <span class="flex items-center gap-2"><i class="fas fa-bell text-xs"></i>Notifications</span>
      <span data-notification-unread-badge class="hidden min-w-[20px] rounded-full bg-red-500 px-1.5 py-0.5 text-center text-[10px] font-bold text-white"></span>
    </a>
    <a href="/chat" class="flex items-center justify-between rounded-xl px-3 py-2.5 text-sm font-semibold transition-colors" th:classappend="${activePage == 'chat'} ? 'bg-midnight-700 text-white shadow-sm' : 'text-slate-700 hover:bg-slate-50 hover:text-slate-900'">
      <span class="flex items-center gap-2"><i class="fas fa-comments text-xs"></i>Inbox Chat</span>
      <span data-chat-unread-badge class="hidden min-w-[20px] rounded-full bg-red-500 px-1.5 py-0.5 text-center text-[10px] font-bold text-white"></span>
    </a>
    <a href="/agent/profile" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold transition-colors" th:classappend="${activePage == 'profile'} ? 'bg-midnight-700 text-white shadow-sm' : 'text-slate-700 hover:bg-slate-50 hover:text-slate-900'">
      <i class="fas fa-user-circle text-xs"></i>
      My Profile
    </a>
  </nav>
</aside>
