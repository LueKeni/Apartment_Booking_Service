    <a href="/agent/listings" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-semibold transition-colors" th:classappend="${activePage == 'listings'} ? 'bg-indigo-50 text-indigo-700' : 'text-slate-700 hover:bg-slate-50 hover:text-slate-900'">
