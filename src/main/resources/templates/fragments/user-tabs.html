<div th:fragment="userTabs(activePage)" class="mb-5 flex flex-wrap gap-2">
  <a href="/user/dashboard"
     class="rounded-full border px-4 py-2 text-sm font-semibold"
     th:classappend="${activePage == 'dashboard'} ? ' border-transparent bg-tealdeep text-white' : ' border-slate-300 bg-white text-slate-700'">Dashboard</a>
  <a href="/user/favorites"
     class="rounded-full border px-4 py-2 text-sm font-semibold"
     th:classappend="${activePage == 'favorites'} ? ' border-transparent bg-tealdeep text-white' : ' border-slate-300 bg-white text-slate-700'">Favorites</a>
  <a href="/user/appointments"
     class="rounded-full border px-4 py-2 text-sm font-semibold"
     th:classappend="${activePage == 'appointments'} ? ' border-transparent bg-tealdeep text-white' : ' border-slate-300 bg-white text-slate-700'">Appointments</a>
  <a href="/user/notifications"
     class="rounded-full border px-4 py-2 text-sm font-semibold"
     th:classappend="${activePage == 'notifications'} ? ' border-transparent bg-tealdeep text-white' : ' border-slate-300 bg-white text-slate-700'">Notifications</a>
</div>
