<header th:fragment="siteHeader" class="sticky top-0 z-50 w-full border-b border-slate-200/70 bg-white/90 backdrop-blur-xl">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
    <a href="/" class="group flex items-center gap-3">
      <span class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-midnight-700 to-midnight-900 font-display text-lg font-bold text-champagne-300 shadow-lg shadow-midnight-900/20">AG</span>
      <span class="hidden flex-col sm:flex">
        <span class="font-display text-xl font-bold leading-none text-midnight-900">Aurelia Grand Estates</span>
        <span class="mt-1 text-[10px] font-bold uppercase tracking-[0.24em] text-slate-400">Signature Apartment Network</span>
      </span>
      <span class="font-display text-lg font-bold text-midnight-900 sm:hidden">Aurelia</span>
    </a>

    <nav class="hidden items-center gap-6 text-sm font-semibold text-slate-600 lg:flex">
      <a href="/#listing-search" class="transition-colors hover:text-midnight-700">Explore</a>
      <a href="/#top-agents" class="transition-colors hover:text-midnight-700">Elite Agents</a>
      <a th:if="${isAuthenticated}" href="/chat" class="transition-colors hover:text-midnight-700">Messages</a>
    </nav>

    <div class="flex items-center gap-2.5 sm:gap-3.5">
      <div th:if="${isAuthenticated}" class="relative" data-notification-root>
        <button type="button"
                class="relative flex h-11 w-11 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-600 shadow-sm transition-colors hover:bg-slate-50"
                data-notification-toggle
                aria-label="Open notifications"
                aria-expanded="false">
          <i class="fas fa-bell text-base"></i>
          <span data-notification-unread-badge
                class="hidden absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-rose-500 text-[10px] font-bold text-white ring-2 ring-white"></span>
        </button>

        <div data-notification-panel
             class="hidden absolute right-0 z-50 mt-3 w-[360px] max-w-[92vw] origin-top-right rounded-[1.25rem] border border-slate-100 bg-white p-5 shadow-2xl transition-all">
          <div class="mb-4 flex items-center justify-between gap-2 border-b border-slate-100 pb-3">
            <p class="text-base font-bold text-slate-900">Notifications</p>
            <button type="button"
                    data-notification-mark-all
                    class="text-[10px] font-bold uppercase tracking-wider text-slate-400 transition-colors hover:text-midnight-700">
              Mark all read
            </button>
          </div>
          <div data-notification-empty class="rounded-xl border border-dashed border-slate-200 p-8 text-center text-sm font-medium text-slate-500">
            You are all caught up.
          </div>
          <div data-notification-list class="max-h-[60vh] space-y-3 overflow-auto pr-1"></div>
          <div class="mt-4 border-t border-slate-100 pt-4 text-center">
            <a th:href="${hasRoleAdmin} ? @{/user/notifications} : (${hasRoleAgent} ? @{/agent/notifications} : @{/user/notifications})"
               class="inline-block w-full rounded-xl bg-slate-50 py-2.5 text-sm font-bold text-midnight-900 transition-colors hover:bg-slate-100">View all activity</a>
          </div>
        </div>
      </div>

      <a th:if="${hasRoleUser}"
         th:href="${hasRoleAdmin} ? @{/admin/dashboard} : (${hasRoleAgent} ? @{/agent/dashboard} : @{/user/dashboard})"
         class="hidden rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 shadow-sm transition-colors hover:bg-slate-50 hover:text-slate-900 sm:inline-flex">Dashboard</a>

      <span th:if="${isAuthenticated}" class="hidden rounded-full border border-slate-200 bg-slate-50 px-4 py-2 text-[11px] font-bold tracking-wider text-slate-600 lg:inline-flex" th:text="${currentEmail}"></span>

      <a th:if="${!isAuthenticated}" href="/auth/login" class="rounded-full bg-midnight-700 px-6 py-2.5 text-sm font-bold text-white shadow-md transition-all hover:-translate-y-0.5 hover:bg-midnight-600">Log in</a>

      <form th:if="${isAuthenticated}" method="post" action="/auth/logout" class="m-0">
        <button type="submit" class="rounded-full border border-slate-200 bg-white px-5 py-2.5 text-sm font-bold text-slate-700 shadow-sm transition-colors hover:bg-slate-50">Log out</button>
      </form>
    </div>
  </div>
</header>
