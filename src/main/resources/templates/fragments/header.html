<header th:fragment="siteHeader" class="sticky top-0 z-50 w-full border-b border-slate-200/60 bg-white/85 backdrop-blur-xl">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
    
    <a href="/" class="flex items-center gap-2 text-2xl font-extrabold tracking-tight text-[#0b1437] hover:opacity-80 transition-opacity">
      <i class="fas fa-building text-amber-500"></i>
      VistaNest
    </a>

    <div class="flex items-center gap-3 sm:gap-4">
      
      <div th:if="${isAuthenticated}" class="relative" data-notification-root>
        <button type="button"
                class="relative flex h-11 w-11 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-600 shadow-sm hover:bg-slate-50 transition-colors"
                data-notification-toggle
                aria-label="Open notifications"
                aria-expanded="false">
          <i class="fas fa-bell text-lg"></i>
          <span data-notification-unread-badge
                class="hidden absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-rose-500 text-[10px] font-bold text-white ring-2 ring-white"></span>
        </button>
        
        <div data-notification-panel
             class="hidden absolute right-0 z-50 mt-3 w-[360px] max-w-[92vw] rounded-[1.5rem] border border-slate-100 bg-white p-5 shadow-2xl origin-top-right transition-all">
          <div class="mb-4 flex items-center justify-between gap-2 border-b border-slate-100 pb-3">
            <p class="text-base font-bold text-[#111827]">Notifications</p>
            <button type="button"
                    data-notification-mark-all
                    class="text-[10px] font-bold uppercase tracking-wider text-slate-400 hover:text-[#0b1437] transition-colors">
              Mark all read
            </button>
          </div>
          <div data-notification-empty class="rounded-[1.2rem] border border-dashed border-slate-200 p-8 text-center text-sm font-medium text-slate-500">
            You're all caught up!
          </div>
          <div data-notification-list class="max-h-[60vh] space-y-3 overflow-auto pr-1"></div>
          <div class="mt-4 pt-4 border-t border-slate-100 text-center">
            <a th:href="${hasRoleAdmin} ? @{/user/notifications} : (${hasRoleAgent} ? @{/agent/notifications} : @{/user/notifications})"
               class="inline-block w-full rounded-[1rem] bg-slate-50 py-2.5 text-sm font-bold text-[#0b1437] hover:bg-slate-100 transition-colors">View all activity</a>
          </div>
        </div>
      </div>

      <a th:if="${hasRoleUser}"
         th:href="${hasRoleAdmin} ? @{/admin/dashboard} : (${hasRoleAgent} ? @{/agent/dashboard} : @{/user/dashboard})"
         class="hidden sm:block text-sm font-bold text-slate-600 hover:text-[#0b1437] transition-colors">Dashboard</a>
      
      <span th:if="${isAuthenticated}" class="hidden rounded-full bg-slate-50 border border-slate-200 px-4 py-2 text-[11px] font-bold tracking-wider text-slate-600 md:inline-block shadow-sm" th:text="${currentEmail}"></span>
      
      <a th:if="${!isAuthenticated}" href="/auth/login" class="rounded-full bg-[#0b1437] px-7 py-3 text-sm font-bold text-white shadow-md hover:bg-[#1a234b] transition-all transform hover:-translate-y-0.5">Log in</a>
      
      <form th:if="${isAuthenticated}" method="post" action="/auth/logout" class="m-0">
        <button type="submit" class="rounded-full bg-white border border-slate-200 px-6 py-2.5 text-sm font-bold text-slate-700 shadow-sm hover:bg-slate-50 transition-all">Log out</button>
      </form>
    </div>
  </div>
</header>
