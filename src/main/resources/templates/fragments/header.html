<header th:fragment="siteHeader" class="top-shell sticky top-0 z-30">
  <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-3 px-4 py-4">
    <a href="/" class="brand-title text-xl font-semibold tracking-tight text-ink">VistaNest Booking</a>

    <div class="flex items-center gap-2 text-sm">
      <div th:if="${isAuthenticated}" class="relative" data-notification-root>
        <button type="button"
                class="relative rounded-full border border-slate-300 bg-white px-3 py-2 text-slate-700"
                data-notification-toggle
                aria-label="Open notifications"
                aria-expanded="false">
          <span>Notifications</span>
          <span data-notification-unread-badge
                class="hidden absolute -right-1 -top-1 min-w-[20px] rounded-full bg-coral px-1.5 py-0.5 text-center text-xs font-semibold text-white"></span>
        </button>
        <div data-notification-panel
             class="hidden absolute right-0 z-50 mt-2 w-[360px] max-w-[92vw] rounded-2xl border border-slate-200 bg-white p-3 shadow-xl">
          <div class="mb-2 flex items-center justify-between gap-2">
            <p class="text-sm font-semibold text-ink">Notifications</p>
            <button type="button"
                    data-notification-mark-all
                    class="rounded-full border border-slate-300 bg-white px-3 py-1 text-xs font-semibold text-slate-700">
              Mark all read
            </button>
          </div>
          <div data-notification-empty class="rounded-xl border border-dashed border-slate-300 p-3 text-sm text-slate-500">
            No notifications yet.
          </div>
          <div data-notification-list class="max-h-80 space-y-2 overflow-auto"></div>
          <div class="mt-3 text-right">
            <a th:href="${hasRoleAdmin} ? @{/user/notifications} : (${hasRoleAgent} ? @{/agent/notifications} : @{/user/notifications})"
               class="text-sm font-semibold text-tealdeep">View all</a>
          </div>
        </div>
      </div>
      <a th:if="${hasRoleUser}"
         th:href="${hasRoleAdmin} ? @{/admin/dashboard} : (${hasRoleAgent} ? @{/agent/dashboard} : @{/user/dashboard})"
         class="pill">Dashboard</a>
      <span th:if="${isAuthenticated}" class="hidden rounded-full bg-white/80 px-3 py-1.5 text-slate-700 md:inline" th:text="${currentEmail}"></span>
      <a th:if="${!isAuthenticated}" href="/auth/login" class="rounded-full bg-tealdeep px-4 py-2 font-semibold text-white">Login</a>
      <form th:if="${isAuthenticated}" method="post" action="/auth/logout">
        <button type="submit" class="rounded-full border border-slate-300 bg-white px-4 py-2 font-semibold text-slate-700">Logout</button>
      </form>
    </div>
  </div>
</header>
