<header th:fragment="siteHeader" class="sticky top-0 z-50 w-full border-b border-slate-200 bg-white/80 backdrop-blur-md">
  <div class="mx-auto flex max-w-[1400px] flex-wrap items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
    <a href="/" class="flex items-center gap-2 text-xl font-bold tracking-tight text-indigo-600">
      <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 12h3v8h14v-8h3L12 2zm0 2.83L17.17 10H15v8H9v-8H6.83L12 4.83z"/></svg>
      VistaNest
    </a>

    <div class="flex items-center gap-3 text-sm">
      <div th:if="${isAuthenticated}" class="relative" data-notification-root>
        <button type="button"
                class="relative rounded-full p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-colors"
                data-notification-toggle
                aria-label="Open notifications"
                aria-expanded="false">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span data-notification-unread-badge
                class="hidden absolute right-1 top-1 flex h-4 w-4 items-center justify-center rounded-full bg-red-500 text-[10px] font-bold text-white ring-2 ring-white"></span>
        </button>
        
        <div data-notification-panel
             class="hidden absolute right-0 z-50 mt-2 w-[360px] max-w-[90vw] origin-top-right rounded-2xl bg-white p-4 shadow-xl ring-1 ring-slate-200">
          <div class="mb-3 flex items-center justify-between">
            <h3 class="font-semibold text-slate-900">Notifications</h3>
            <button type="button"
                    data-notification-mark-all
                    class="text-xs font-medium text-indigo-600 hover:text-indigo-500">
              Mark all read
            </button>
          </div>
          <div data-notification-empty class="rounded-lg border-2 border-dashed border-slate-100 p-6 text-center text-sm text-slate-500">
            No notifications yet.
          </div>
          <div data-notification-list class="max-h-[60vh] space-y-2 overflow-y-auto pr-1"></div>
          <div class="mt-4 border-t border-slate-100 pt-3 text-center">
            <a th:href="${hasRoleAdmin} ? @{/user/notifications} : (${hasRoleAgent} ? @{/agent/notifications} : @{/user/notifications})"
               class="text-sm font-semibold text-indigo-600 hover:text-indigo-500">View all notifications</a>
          </div>
        </div>
      </div>

      <a th:if="${hasRoleUser}"
         th:href="${hasRoleAdmin} ? @{/admin/dashboard} : (${hasRoleAgent} ? @{/agent/dashboard} : @{/user/dashboard})"
         class="hidden sm:inline-block rounded-md px-3 py-2 font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900">Dashboard</a>
      
      <span th:if="${isAuthenticated}" class="hidden rounded-full bg-slate-100 px-3 py-1.5 font-medium text-slate-700 sm:inline-block ring-1 ring-inset ring-slate-200" th:text="${currentEmail}"></span>
      
      <a th:if="${!isAuthenticated}" href="/auth/login" class="rounded-lg bg-indigo-600 px-4 py-2 font-semibold text-white shadow-sm hover:bg-indigo-500 transition-colors">Log in</a>
      
      <form th:if="${isAuthenticated}" method="post" action="/auth/logout">
        <button type="submit" class="rounded-lg bg-white px-4 py-2 font-semibold text-slate-700 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50 transition-colors">Log out</button>
      </form>
    </div>
  </div>
</header>
