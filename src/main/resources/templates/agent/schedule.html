<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Agent Schedule Planner')}"></head>
<body>
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="page-enter mx-auto max-w-6xl px-4 py-8">
    <div class="workspace-grid">
      <div th:replace="~{fragments/agent-sidebar :: agentSidebar('schedule')}"></div>

      <div>
    <section class="glass-card p-6">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h1 class="text-3xl font-semibold text-ink">Schedule Planner</h1>
          <p class="mt-1 text-sm text-slate-600">Set your available slots so customers can book you faster.</p>
        </div>
        <a href="/agent/dashboard" class="pill">Back to Dashboard</a>
      </div>
    </section>

    <div th:if="${param.saved}" class="mt-4 rounded-2xl border border-emerald-300 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">Schedule saved successfully.</div>

    <section class="mt-6 glass-card p-6">
      <h2 class="text-xl font-semibold">Add or Update Availability</h2>
      <form action="/agent/schedule" method="post" class="mt-4 grid gap-3 md:grid-cols-3">
        <input type="date" name="availableDate" required class="rounded-xl border border-slate-300 bg-white px-3 py-2" />
        <input type="text" name="timeSlots" placeholder="08:00, 14:00, 16:30" class="rounded-xl border border-slate-300 bg-white px-3 py-2" />
        <button class="rounded-xl bg-tealdeep px-4 py-2 font-semibold text-white">Save Slots</button>
      </form>
    </section>

    <section class="mt-6 glass-card p-6">
      <h2 class="text-xl font-semibold">Upcoming Calendar</h2>
      <div class="mt-4 grid gap-3 md:grid-cols-2 lg:grid-cols-3">
        <article th:if="${#lists.isEmpty(schedules)}" class="rounded-2xl border border-dashed border-slate-300 p-4 text-sm text-slate-500">No schedule available.</article>
        <article th:each="schedule : ${schedules}" class="rounded-2xl border border-slate-200 bg-white/75 p-4">
          <h3 class="font-semibold text-ink" th:text="${schedule.availableDate}"></h3>
          <p class="mt-2 text-sm text-slate-600" th:text="${#strings.listJoin(schedule.timeSlots, ', ')}"></p>
        </article>
      </div>
    </section>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
