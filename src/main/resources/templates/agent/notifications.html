<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Agent Notifications')}"></head>
<body class="bg-slate-50 font-sans text-slate-900 antialiased">
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="mx-auto max-w-[1400px] px-4 py-8 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 items-start gap-8 lg:grid-cols-[260px_1fr]">
      <div th:replace="~{fragments/agent-sidebar :: agentSidebar('notifications')}"></div>

      <div class="space-y-6">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">Notifications Center</h1>
            <p class="mt-1 text-sm text-slate-500">You have <span class="font-bold text-indigo-600" th:text="${unreadNotificationCount}">0</span> unread messages.</p>
          </div>
          <form th:if="${unreadNotificationCount > 0}" action="/agent/notifications/read-all" method="post">
            <button class="inline-flex items-center gap-2 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition-all hover:bg-indigo-500">Mark all as read</button>
          </form>
        </div>

        <div th:if="${param.updated}" class="rounded-xl bg-green-50 p-4 ring-1 ring-green-600/20 text-sm font-medium text-green-800">Notifications updated.</div>

        <div class="rounded-2xl bg-white shadow-sm ring-1 ring-slate-200 overflow-hidden">
          <div th:if="${#lists.isEmpty(notifications)}" class="p-12 text-center text-sm text-slate-500">No notifications available. You're all caught up!</div>
          
          <ul role="list" class="divide-y divide-slate-100">
            <li th:each="notification : ${notifications}" th:classappend="${!notification.isRead ? 'bg-blue-50/50' : 'bg-white'}" class="p-6 transition-colors hover:bg-slate-50">
              <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4">
                <div class="flex gap-4">
                  <div class="mt-1 h-2 w-2 flex-shrink-0 rounded-full" th:classappend="${!notification.isRead ? 'bg-indigo-600' : 'bg-transparent'}"></div>
                  <div>
                    <h2 class="text-sm font-bold text-slate-900" th:text="${notification.title}"></h2>
                    <p class="mt-1 text-sm text-slate-600" th:text="${notification.message}"></p>
                    <div class="mt-3 flex items-center gap-2">
                      <span class="inline-flex items-center rounded-md bg-slate-100 px-2 py-1 text-xs font-medium text-slate-600 ring-1 ring-inset ring-slate-500/10" th:text="${notification.type}"></span>
                      <span class="text-xs text-slate-400" th:text="${#temporals.format(notification.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                  </div>
                </div>
                <form th:if="${notification.isRead == false}" th:action="@{/agent/notifications/{id}/read(id=${notification.id})}" method="post" class="ml-6 sm:ml-0 flex-shrink-0">
                  <button class="rounded-md bg-white px-2.5 py-1.5 text-xs font-semibold text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50">Mark read</button>
                </form>
              </div>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
