<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Agent Notifications | Aurelia')}"></head>
<body class="font-sans text-slate-900 antialiased">
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="page-enter mx-auto max-w-[1400px] px-4 py-8 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 items-start gap-8 lg:grid-cols-[260px_1fr]">
      <div th:replace="~{fragments/agent-sidebar :: agentSidebar('notifications')}"></div>

      <div class="space-y-6">
        <section class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h1 class="font-display text-3xl font-bold text-midnight-900">Notifications Center</h1>
            <p class="mt-1 text-sm text-slate-500">Unread messages: <span class="font-bold text-midnight-700" th:text="${unreadNotificationCount}">0</span></p>
          </div>
          <form th:if="${unreadNotificationCount > 0}" action="/agent/notifications/read-all" method="post">
            <button class="rounded-xl bg-midnight-700 px-4 py-2.5 text-sm font-bold text-white shadow-sm transition-colors hover:bg-midnight-600">Mark all as read</button>
          </form>
        </section>

        <div th:if="${param.updated}" class="rounded-xl border border-emerald-200 bg-emerald-50 p-4 text-sm font-semibold text-emerald-700">
          Notifications updated.
        </div>

        <section class="rounded-2xl bg-white p-2 sm:p-4">
          <div th:if="${#lists.isEmpty(notifications)}" class="rounded-xl border border-dashed border-slate-300 p-12 text-center text-sm text-slate-500">
            No notifications available. You are all caught up.
          </div>

          <ul th:if="${!#lists.isEmpty(notifications)}" class="space-y-3">
            <li th:each="notification : ${notifications}" class="rounded-xl border border-slate-200 p-5" th:classappend="${!notification.isRead} ? ' bg-sky-50/60' : ' bg-white'">
              <div class="flex flex-col justify-between gap-4 sm:flex-row sm:items-start">
                <div class="min-w-0">
                  <p class="text-base font-bold text-slate-900" th:text="${notification.title}"></p>
                  <p class="mt-1 text-sm text-slate-600" th:text="${notification.message}"></p>
                  <div class="mt-3 flex flex-wrap items-center gap-2.5">
                    <span class="pill" th:text="${notification.type}"></span>
                    <span class="text-xs text-slate-500" th:text="${#temporals.format(notification.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                  </div>
                </div>

                <form th:if="${notification.isRead == false}" th:action="@{/agent/notifications/{id}/read(id=${notification.id})}" method="post">
                  <button class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-semibold text-slate-700 hover:bg-slate-50">Mark read</button>
                </form>
              </div>
            </li>
          </ul>
        </section>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
