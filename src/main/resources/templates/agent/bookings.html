<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Agent Booking Pipeline | Aurelia')}"></head>
<body class="font-sans text-slate-900 antialiased">
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="page-enter mx-auto max-w-[1400px] px-4 py-8 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 items-start gap-8 lg:grid-cols-[260px_1fr]">
      <div th:replace="~{fragments/agent-sidebar :: agentSidebar('bookings')}"></div>

      <div class="space-y-6">
        <section class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <h1 class="font-display text-3xl font-bold text-midnight-900">Booking Pipeline</h1>
            <p class="mt-1 text-sm text-slate-500">Review requests, update statuses, and keep clients informed.</p>
          </div>
          <a href="/agent/dashboard" class="text-sm font-semibold text-midnight-700 hover:text-midnight-600">Back to Dashboard</a>
        </section>

        <div th:if="${param.statusUpdated}" class="rounded-xl border border-emerald-200 bg-emerald-50 p-4 text-sm font-semibold text-emerald-700">
          Booking status updated successfully.
        </div>

        <section class="rounded-2xl bg-white" data-table>
          <div class="border-b border-slate-200 px-6 py-4">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <input data-table-search type="text" placeholder="Search apartment or customer..." class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-midnight-100 sm:max-w-sm" />
              <div class="flex flex-wrap gap-2">
                <select data-table-filter-key="status" class="rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-midnight-100">
                  <option value="">All Status</option>
                  <option value="PENDING">PENDING</option>
                  <option value="CONFIRMED">CONFIRMED</option>
                  <option value="CANCELLED">CANCELLED</option>
                  <option value="COMPLETED">COMPLETED</option>
                </select>
                <select data-table-sort class="rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-midnight-100">
                  <option value="">Sort by</option>
                  <option value="scheduled:asc">Schedule Asc</option>
                  <option value="scheduled:desc">Schedule Desc</option>
                  <option value="customer:asc">Customer A-Z</option>
                  <option value="customer:desc">Customer Z-A</option>
                </select>
              </div>
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="min-w-full">
              <thead class="bg-slate-50 text-left">
                <tr>
                  <th class="px-6 py-3 text-sm font-bold text-slate-700">Apartment</th>
                  <th class="px-6 py-3 text-sm font-bold text-slate-700">Customer</th>
                  <th class="px-6 py-3 text-sm font-bold text-slate-700">Schedule</th>
                  <th class="px-6 py-3 text-sm font-bold text-slate-700">Booked At</th>
                  <th class="px-6 py-3 text-sm font-bold text-slate-700">Status</th>
                  <th class="px-6 py-3 text-sm font-bold text-slate-700">Actions</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-200" data-table-body>
                <tr th:if="${#lists.isEmpty(appointments)}">
                  <td colspan="6" class="px-6 py-10 text-center text-sm text-slate-500">No booking requests yet.</td>
                </tr>
                <tr th:each="appointment : ${appointments}" data-row
                    th:attr="data-search=${appointment.apartment.title + ' ' + appointment.user.fullName},data-status=${appointment.status},data-scheduled=${appointment.scheduledDate + 'T' + appointment.scheduledTime},data-customer=${appointment.user.fullName}">
                  <td class="px-6 py-4 text-sm font-semibold text-slate-900" th:text="${appointment.apartment.title}"></td>
                  <td class="px-6 py-4 text-sm text-slate-700" th:text="${appointment.user.fullName}"></td>
                  <td class="px-6 py-4 text-sm text-slate-600" th:text="${appointment.scheduledDate + ' ' + appointment.scheduledTime}"></td>
                  <td class="px-6 py-4 text-sm text-slate-500" th:text="${appointment.createdAt}"></td>
                  <td class="px-6 py-4">
                    <span class="pill" th:text="${appointment.status}"></span>
                  </td>
                  <td class="px-6 py-4">
                    <form th:action="@{/agent/bookings/{id}/status(id=${appointment.id})}" method="post" class="grid gap-2 md:grid-cols-[140px_1fr_auto]">
                      <select name="status" class="rounded-lg border border-slate-300 px-2 py-1.5 text-xs text-slate-900">
                        <option value="PENDING">PENDING</option>
                        <option value="CONFIRMED">CONFIRMED</option>
                        <option value="CANCELLED">CANCELLED</option>
                        <option value="COMPLETED">COMPLETED</option>
                      </select>
                      <input name="agentNote" placeholder="Internal note" class="rounded-lg border border-slate-300 px-2 py-1.5 text-xs text-slate-900" />
                      <button class="rounded-lg bg-midnight-700 px-3 py-1.5 text-xs font-bold text-white hover:bg-midnight-600">Apply</button>
                    </form>
                  </td>
                </tr>
                <tr data-table-empty class="hidden">
                  <td colspan="6" class="px-6 py-10 text-center text-sm text-slate-500">No booking matches current filters.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
