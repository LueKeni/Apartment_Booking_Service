<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Listing Moderation')}"></head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="mx-auto max-w-[1400px] px-4 py-8 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 items-start gap-8 lg:grid-cols-[260px_1fr]">
      <div th:replace="~{fragments/admin-sidebar :: adminSidebar('listings')}"></div>

      <div class="space-y-6">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">Listing Moderation</h1>
            <p class="mt-1 text-sm text-slate-500">Review, filter, and moderate properties across the platform.</p>
          </div>
          <a href="/admin/dashboard" class="inline-flex items-center gap-2 text-sm font-medium text-slate-600 hover:text-slate-900">
            &larr; Back to Dashboard
          </a>
        </div>

        <div th:if="${param.updated}" class="rounded-xl bg-green-50 p-4 ring-1 ring-green-600/20">
          <div class="flex">
            <div class="flex-shrink-0">
              <svg class="h-5 w-5 text-green-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" /></svg>
            </div>
            <div class="ml-3">
              <p class="text-sm font-medium text-green-800">Listing status updated successfully.</p>
            </div>
          </div>
        </div>

        <div class="rounded-2xl bg-white shadow-sm ring-1 ring-slate-200" data-table>
          
          <div class="border-b border-slate-200 px-6 py-4">
            <div class="flex flex-col gap-4 sm:flex-row sm:items-center">
              <div class="relative flex-1">
                <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                  <svg class="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd" /></svg>
                </div>
                <input data-table-search type="text" placeholder="Search listings..." class="block w-full rounded-lg border-0 py-2 pl-10 pr-3 text-slate-900 ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" />
              </div>
              <div class="flex flex-wrap gap-3">
                <select data-table-filter-key="status" class="rounded-lg border-0 py-2 pl-3 pr-8 text-slate-900 ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-indigo-600 sm:text-sm">
                  <option value="">All Status</option>
                  <option value="AVAILABLE">AVAILABLE</option>
                  <option value="PENDING">PENDING</option>
                  <option value="SOLD">SOLD</option>
                  <option value="RENTED">RENTED</option>
                  <option value="HIDDEN">HIDDEN</option>
                </select>
                <select data-table-filter-key="transaction" class="rounded-lg border-0 py-2 pl-3 pr-8 text-slate-900 ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-indigo-600 sm:text-sm">
                  <option value="">All Types</option>
                  <option value="SALE">SALE</option>
                  <option value="RENT">RENT</option>
                </select>
                <select data-table-sort class="rounded-lg border-0 py-2 pl-3 pr-8 text-slate-900 ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-indigo-600 sm:text-sm">
                  <option value="">Sort by</option>
                  <option value="title:asc">Title A-Z</option>
                  <option value="title:desc">Title Z-A</option>
                  <option value="price:asc">Price Low-High</option>
                  <option value="price:desc">Price High-Low</option>
                </select>
              </div>
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200">
              <thead class="bg-slate-50">
                <tr>
                  <th scope="col" class="px-6 py-3.5 text-left text-sm font-semibold text-slate-900">Listing Details</th>
                  <th scope="col" class="px-6 py-3.5 text-left text-sm font-semibold text-slate-900">Type & Area</th>
                  <th scope="col" class="px-6 py-3.5 text-left text-sm font-semibold text-slate-900">Price</th>
                  <th scope="col" class="px-6 py-3.5 text-left text-sm font-semibold text-slate-900">Current Status</th>
                  <th scope="col" class="px-6 py-3.5 text-right text-sm font-semibold text-slate-900">Action</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-200 bg-white" data-table-body>
                <tr th:if="${#lists.isEmpty(apartments)}">
                  <td class="px-6 py-12 text-center text-sm text-slate-500" colspan="5">No listings found.</td>
                </tr>
                <tr data-row class="hover:bg-slate-50/50"
                    th:each="apartment : ${apartments}"
                    th:attr="data-search=${apartment.title + ' ' + (apartment.locationAreaLabel != null ? apartment.locationAreaLabel : '') + ' ' + apartment.locationAddress},data-status=${apartment.status},data-transaction=${apartment.transactionType},data-title=${apartment.title},data-price=${apartment.price}">
                  
                  <td class="whitespace-nowrap px-6 py-4">
                    <div class="text-sm font-medium text-slate-900" th:text="${apartment.title}"></div>
                  </td>
                  <td class="whitespace-nowrap px-6 py-4">
                    <div class="text-sm text-slate-900" th:text="${apartment.transactionType}"></div>
                    <div class="text-xs text-slate-500" th:text="${apartment.locationAreaLabel != null ? apartment.locationAreaLabel : '-'}"></div>
                  </td>
                  <td class="whitespace-nowrap px-6 py-4 text-sm font-semibold text-indigo-600" th:text="${apartment.price}"></td>
                  <td class="whitespace-nowrap px-6 py-4">
                    <span th:classappend="${apartment.status == 'AVAILABLE' ? 'bg-green-50 text-green-700 ring-green-600/20' : (apartment.status == 'HIDDEN' ? 'bg-slate-100 text-slate-700 ring-slate-500/10' : 'bg-yellow-50 text-yellow-800 ring-yellow-600/20')}" 
                          class="inline-flex items-center rounded-md px-2 py-1 text-xs font-medium ring-1 ring-inset" th:text="${apartment.status}"></span>
                  </td>
                  <td class="whitespace-nowrap px-6 py-4 text-right">
                    <form th:action="@{/admin/listings/{id}/status(id=${apartment.id})}" method="post" class="inline-flex items-center gap-2">
                      <select name="status" class="rounded-md border-0 py-1.5 pl-3 pr-8 text-xs text-slate-900 ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-indigo-600">
                        <option value="AVAILABLE">AVAILABLE</option>
                        <option value="PENDING">PENDING</option>
                        <option value="SOLD">SOLD</option>
                        <option value="RENTED">RENTED</option>
                        <option value="HIDDEN">HIDDEN</option>
                      </select>
                      <button class="rounded-md bg-white px-2.5 py-1.5 text-xs font-semibold text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50">Update</button>
                    </form>
                  </td>
                </tr>
                <tr data-table-empty class="hidden">
                  <td class="px-6 py-12 text-center text-sm text-slate-500" colspan="5">No listing matches current filters.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
