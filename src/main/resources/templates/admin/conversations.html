<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Admin Chat Log Console')}"></head>
<body>
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="page-enter mx-auto max-w-7xl px-4 py-8">
    <div class="workspace-grid">
      <div th:replace="~{fragments/admin-sidebar :: adminSidebar('conversations')}"></div>

      <div>
      <section class="glass-card p-6">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <h1 class="text-3xl font-semibold text-ink">Chat Log Console</h1>
            <p class="mt-1 text-sm text-slate-600">Review communication history between users and agents.</p>
          </div>
          <a href="/admin/dashboard" class="pill">Back to Dashboard</a>
        </div>
      </section>

      <section class="mt-6 space-y-3">
        <article th:if="${#lists.isEmpty(conversations)}" class="glass-card p-5 text-sm text-slate-500">No conversations found.</article>

        <article th:each="c : ${conversations}" class="glass-card p-5">
          <p class="text-lg font-semibold text-ink" th:text="${c.apartment.title}"></p>
          <p class="mt-1 text-sm text-slate-600" th:text="${c.user.fullName + ' ↔ ' + c.agent.fullName}"></p>
          <div class="mt-3">
            <span class="pill" th:text="${c.lastMessageAt}"></span>
          </div>
        </article>
      </section>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
