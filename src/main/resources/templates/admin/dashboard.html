<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Admin Control Tower')}"></head>
<body>
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="page-enter mx-auto max-w-7xl px-4 py-8">
    <div class="workspace-grid">
      <div th:replace="~{fragments/admin-sidebar :: adminSidebar('dashboard')}"></div>

      <div>
    <section class="glass-card p-6">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-semibold text-ink">Admin Control Tower</h1>
          <p class="mt-1 text-sm text-slate-600">Monitor users and listings across the system.</p>
        </div>
        <div class="flex flex-wrap gap-2">
          <a href="/admin/users" class="rounded-full bg-tealdeep px-4 py-2 text-sm font-semibold text-white">Manage Users</a>
          <a href="/admin/listings" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700">Moderate Listings</a>
        </div>
      </div>
    </section>

    <section class="mt-6 data-grid cols-3">
      <article class="glass-card metric-card p-5">
        <p class="text-sm text-slate-600">Total Users</p>
        <p class="mt-2 text-3xl font-bold text-ink" th:text="${userCount}"></p>
      </article>
      <article class="glass-card metric-card p-5">
        <p class="text-sm text-slate-600">Total Listings</p>
        <p class="mt-2 text-3xl font-bold text-ink" th:text="${listingCount}"></p>
      </article>
      <article class="glass-card metric-card p-5">
        <p class="text-sm text-slate-600">Hidden Listings</p>
        <p class="mt-2 text-3xl font-bold text-coral" th:text="${hiddenListingCount}"></p>
      </article>
      <article class="glass-card p-5">
        <p class="text-sm text-slate-600">Quick Access</p>
        <div class="mt-3 flex flex-wrap gap-2">
          <a href="/admin/users" class="pill">User Status</a>
          <a href="/admin/listings" class="pill">Listing Status</a>
        </div>
      </article>
    </section>

    <section class="mt-6">
      <article class="glass-card p-5">
        <h2 class="mb-4 text-lg font-semibold">Latest Users</h2>
        <div class="space-y-2">
          <div th:if="${#lists.isEmpty(latestUsers)}" class="rounded-xl border border-dashed border-slate-300 p-3 text-sm text-slate-500">No users yet.</div>
          <div th:each="u : ${latestUsers}" class="rounded-xl border border-slate-200 bg-white/70 p-3">
            <p class="font-semibold" th:text="${u.fullName}"></p>
            <p class="text-xs text-slate-600" th:text="${u.email + ' • ' + u.role + ' • ' + u.status}"></p>
          </div>
        </div>
      </article>

    </section>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
