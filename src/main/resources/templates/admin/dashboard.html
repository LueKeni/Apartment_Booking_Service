<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Admin Dashboard')}"></head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="mx-auto max-w-[1400px] px-4 py-8 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 items-start gap-8 lg:grid-cols-[260px_1fr]">
      <div th:replace="~{fragments/admin-sidebar :: adminSidebar('dashboard')}"></div>

      <div class="space-y-6">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
          <div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">Admin Control Tower</h1>
            <p class="mt-1 text-sm text-slate-500">System overview, user metrics, and quick actions.</p>
          </div>
          <div class="flex flex-wrap gap-3">
            <a href="/admin/users" class="inline-flex items-center gap-2 rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition-all hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
              Manage Users
            </a>
            <a href="/admin/listings" class="inline-flex items-center gap-2 rounded-lg bg-white px-4 py-2.5 text-sm font-semibold text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 transition-all hover:bg-slate-50">
              Moderate Listings
            </a>
          </div>
        </div>
        <div class="flex flex-wrap gap-2">
          <a href="/admin/users" class="rounded-full bg-tealdeep px-4 py-2 text-sm font-semibold text-white">Manage Users</a>
          <a href="/admin/listings" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700">Moderate Listings</a>
        </div>
      </div>
    </section>

    <section class="mt-6 data-grid cols-3">
      <article class="glass-card metric-card p-5">
        <p class="text-sm text-slate-600">Total Users</p>
        <p class="mt-2 text-3xl font-bold text-ink" th:text="${userCount}"></p>
      </article>
      <article class="glass-card metric-card p-5">
        <p class="text-sm text-slate-600">Total Listings</p>
        <p class="mt-2 text-3xl font-bold text-ink" th:text="${listingCount}"></p>
      </article>
      <article class="glass-card metric-card p-5">
        <p class="text-sm text-slate-600">Hidden Listings</p>
        <p class="mt-2 text-3xl font-bold text-coral" th:text="${hiddenListingCount}"></p>
      </article>
      <article class="glass-card p-5">
        <p class="text-sm text-slate-600">Quick Access</p>
        <div class="mt-3 flex flex-wrap gap-2">
          <a href="/admin/users" class="pill">User Status</a>
          <a href="/admin/listings" class="pill">Listing Status</a>
        </div>

        <div class="rounded-2xl bg-white shadow-sm ring-1 ring-slate-200">
          <div class="border-b border-slate-200 px-6 py-5 flex justify-between items-center">
            <h2 class="text-base font-semibold text-slate-900">Recently Registered Users</h2>
            <a href="/admin/users" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">View all &rarr;</a>
          </div>
          
          <div class="px-6 py-5">
            <div th:if="${#lists.isEmpty(latestUsers)}" class="rounded-xl border-2 border-dashed border-slate-200 py-12 text-center">
              <p class="text-sm text-slate-500">No users have joined yet.</p>
            </div>
            
            <ul role="list" class="divide-y divide-slate-100">
              <li th:each="u : ${latestUsers}" class="flex items-center justify-between gap-x-6 py-4">
                <div class="flex min-w-0 gap-x-4">
                  <div class="h-12 w-12 flex-none rounded-full bg-slate-100 flex items-center justify-center text-lg font-semibold text-slate-600 ring-1 ring-slate-200" th:text="${#strings.substring(u.fullName,0,1)}"></div>
                  <div class="min-w-0 flex-auto">
                    <p class="text-sm font-semibold leading-6 text-slate-900" th:text="${u.fullName}"></p>
                    <p class="mt-1 truncate text-xs leading-5 text-slate-500" th:text="${u.email}"></p>
                  </div>
                </div>
                <div class="flex items-center gap-x-4">
                  <span class="inline-flex items-center rounded-md bg-slate-50 px-2 py-1 text-xs font-medium text-slate-600 ring-1 ring-inset ring-slate-500/10" th:text="${u.role}"></span>
                  <span th:classappend="${u.status.name() == 'ACTIVE' ? 'bg-green-50 text-green-700 ring-green-600/20' : 'bg-red-50 text-red-700 ring-red-600/10'}" 
                        class="inline-flex items-center rounded-md px-2 py-1 text-xs font-medium ring-1 ring-inset" th:text="${u.status}"></span>
                </div>
              </li>
            </ul>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script th:inline="javascript">
    const revenueLabels = /*[[${revenueLabels}]]*/ [];
    const revenueValues = /*[[${revenueValues}]]*/ [];
    const revenueCtx = document.getElementById("pointRevenueChart");
    if (revenueCtx) {
      new Chart(revenueCtx, {
        type: "line",
        data: {
          labels: revenueLabels,
          datasets: [{
            label: "Revenue (VND)",
            data: revenueValues,
            borderColor: "#146c72",
            backgroundColor: "rgba(20, 108, 114, 0.12)",
            borderWidth: 2,
            fill: true,
            tension: 0.35
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
    }
  </script>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
