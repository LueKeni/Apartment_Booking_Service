<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/ui-head :: uiHead('Admin Appointment Monitor')}"></head>
<body>
  <div th:replace="~{fragments/header :: siteHeader}"></div>

  <main class="page-enter mx-auto max-w-7xl px-4 py-8">
    <div class="workspace-grid">
      <div th:replace="~{fragments/admin-sidebar :: adminSidebar('appointments')}"></div>

      <div>
      <section class="glass-card p-6">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <h1 class="text-3xl font-semibold text-ink">Booking Monitor</h1>
            <p class="mt-1 text-sm text-slate-600">Inspect booking quality and status progression across the platform.</p>
          </div>
          <a href="/admin/dashboard" class="pill">Back to Dashboard</a>
        </div>
      </section>

      <section class="mt-6 glass-card p-6" data-table>
        <div class="table-toolbar">
          <input data-table-search type="text" placeholder="Search apartment, user, agent..." class="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" />
          <select data-table-filter-key="status" class="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
            <option value="">All status</option>
            <option value="PENDING">PENDING</option>
            <option value="CONFIRMED">CONFIRMED</option>
            <option value="CANCELLED">CANCELLED</option>
            <option value="COMPLETED">COMPLETED</option>
          </select>
          <select data-table-sort class="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
            <option value="">Sort by</option>
            <option value="scheduled:asc">Schedule Asc</option>
            <option value="scheduled:desc">Schedule Desc</option>
            <option value="apartment:asc">Apartment A-Z</option>
            <option value="apartment:desc">Apartment Z-A</option>
          </select>
        </div>

        <div class="mt-4 overflow-hidden rounded-2xl border border-slate-200">
          <table class="min-w-full divide-y divide-slate-200 text-sm">
            <thead class="bg-slate-50 text-left text-slate-600">
              <tr>
                <th class="px-4 py-3 font-semibold">Apartment</th>
                <th class="px-4 py-3 font-semibold">User</th>
                <th class="px-4 py-3 font-semibold">Agent</th>
                <th class="px-4 py-3 font-semibold">Schedule</th>
                <th class="px-4 py-3 font-semibold">Status</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 bg-white/80" data-table-body>
              <tr th:if="${#lists.isEmpty(appointments)}">
                <td class="px-4 py-4 text-slate-500" colspan="5">No bookings found.</td>
              </tr>
              <tr data-row
                  th:each="a : ${appointments}"
                  th:attr="data-search=${a.apartment.title + ' ' + a.user.fullName + ' ' + a.agent.fullName},data-status=${a.status},data-scheduled=${a.scheduledDate + 'T' + a.scheduledTime},data-apartment=${a.apartment.title}">
                <td class="px-4 py-3 font-semibold text-ink" th:text="${a.apartment.title}"></td>
                <td class="px-4 py-3 text-slate-600" th:text="${a.user.fullName}"></td>
                <td class="px-4 py-3 text-slate-600" th:text="${a.agent.fullName}"></td>
                <td class="px-4 py-3 text-slate-600" th:text="${a.scheduledDate + ' ' + a.scheduledTime}"></td>
                <td class="px-4 py-3"><span class="pill" th:text="${a.status}"></span></td>
              </tr>
              <tr data-table-empty class="hidden">
                <td class="px-4 py-4 text-slate-500" colspan="5">No booking matches current filters.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
