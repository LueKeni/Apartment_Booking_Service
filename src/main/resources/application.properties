spring.application.name=apartment_booking_service

server.port=8080

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/apartment_booking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false

spring.jackson.time-zone=Asia/Ho_Chi_Minh

socketio.host=127.0.0.1
socketio.port=9092
