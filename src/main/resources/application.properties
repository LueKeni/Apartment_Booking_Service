spring.application.name=apartment_booking_service
spring.config.import=optional:file:./oauth-local.properties

server.port=8080

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/apartment_booking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false

spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

socketio.host=127.0.0.1
socketio.port=9092

momo.api-url=https://test-payment.momo.vn/gw_payment/transactionProcessor
momo.secret-key=K951B6PE1waDMi640xX08PD3vg6EkVlz
momo.access-key=F8BBA842ECF85
momo.return-url=http://localhost:8080/agent/points/callback
momo.notify-url=http://localhost:8080/momo/notify
momo.partner-code=MOMO
momo.request-type=captureMoMoWallet

fpt.ai.idr.url=https://api.fpt.ai/vision/idr/vnm/
fpt.ai.idr.api-key=${FPT_AI_IDR_API_KEY:}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:local-facebook-client-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:local-facebook-client-secret}
spring.security.oauth2.client.registration.facebook.scope=public_profile
spring.security.oauth2.client.registration.facebook.client-name=Facebook
spring.security.oauth2.client.provider.facebook.authorization-uri=https://www.facebook.com/v19.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.token-uri=https://graph.facebook.com/v19.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/me?fields=id,name,picture.type(large)
spring.security.oauth2.client.provider.facebook.user-name-attribute=id
